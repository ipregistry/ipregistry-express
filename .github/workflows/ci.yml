name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
        express-version: ['4', '5']
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Express ${{ matrix.express-version }}
        if: matrix.express-version == '4'
        run: npm install --no-save express@4 @types/express@4

      - name: Lint
        if: matrix.express-version == '5'
        run: npm run lint

      - name: Type check
        if: matrix.express-version == '5'
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        if: matrix.express-version == '5'
        run: npm run build

      - name: Packaging smoke test
        if: matrix.express-version == '5'
        run: npm run test:smoke
